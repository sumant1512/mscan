name: Build and Deploy to Cloud Run ms-server

on:
  # push:
  #   branches:
  #     - fix-directory
  workflow_dispatch:

env:
  PROJECT_ID: orbital-nirvana-492005-q3
  GAR_LOCATION: us-east4
  REPOSITORY: mscan-server
  SERVICE_NAME: mscan-server  #keep is same as in env file 
  REGION: us-east4
  IMAGE_NAME: mscan-server

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Load Cloud Run parameters
        uses: ./.github/actions/read-cloudrun-parameters
        with:
          config_file: cloudrun-config/global-cloudrun.yaml
          env_file: cloudrun-config/global-env-parameters.yaml

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Docker auth for Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./mscan-server
          file: ./mscan-server/Dockerfile  
          push: true
          tags: | 
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      - name: Render Cloud Run manifest
        env:
          SERVICE_IMAGE: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
          SERVICE_CONTAINER_NAME: nodejsapp
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path
          import yaml

          template_path = Path("cloudrun-config/cloudrun-config.yaml")
          output_path = Path("cloudrun-config/rendered-cloudrun.yaml")

          placeholder_re = re.compile(r"\$\{([A-Z0-9_]+)\}")

          def render(obj):
            if isinstance(obj, str):
                def repl(match):
                    key = match.group(1)
                    if key not in os.environ:
                        raise KeyError(f"Missing env var: {key}")
                    return str(os.environ[key])

                return placeholder_re.sub(repl, obj)

            if isinstance(obj, list):
                return [render(item) for item in obj]

            if isinstance(obj, dict):
                return {k: render(v) for k, v in obj.items()}

            return obj
          template = yaml.safe_load(template_path.read_text(encoding="utf-8"))
          rendered = render(template)
          output_path.write_text(yaml.safe_dump(rendered, sort_keys=False), encoding="utf-8")
          print(f"Rendered manifest written to {output_path}")
          PY
      - name: Deploy to Cloud Run
        run: |
           cat cloudrun-config/rendered-cloudrun.yaml 
           
      - name: Deploy to Cloud Run
        run: |
          gcloud run services replace cloudrun-config/rendered-cloudrun.yaml \
            --region "${REGION}" \
            --project "${PROJECT_ID}"

      - name: Show service URL
        run: |
          gcloud run services describe "${SERVICE_NAME}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --format='value(status.url)'
