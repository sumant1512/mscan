name: Docker Image CI

on:
  # push:
  #   branches: ["main"]
  # pull_request:
  #   branches: ["main"]
    workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with docker compose
        run: docker compose build --no-cache

      - name: Verify images built
        run: |
          echo "=== Built Images ==="
          docker images | grep mscan
          echo ""
          echo "=== Compose Services ==="
          docker compose config --services

      - name: Tag images for testing
        run: |
          docker tag mscan-mscan-server:latest mscan-server:latest
          docker tag mscan-mscan-client:latest mscan-client:latest
          echo "✅ Images tagged successfully"

      - name: Test services
        run: |
          echo "Testing mscan-server image..."
          docker run --rm -e NODE_ENV=test mscan-server:latest npm --version
          echo "✅ mscan-server image OK"

          echo ""
          echo "Testing mscan-client image..."
          docker run --rm mscan-client:latest nginx -v
          echo "✅ mscan-client image OK"

      - name: Clean up
        if: always()
        run: docker compose down --rmi all 2>/dev/null || true
