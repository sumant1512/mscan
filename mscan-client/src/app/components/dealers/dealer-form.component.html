<div class="form-container">
  <div class="form-header">
    <h2>{{ isEditMode ? 'Edit Dealer' : 'Create New Dealer' }}</h2>
  </div>

  <div *ngIf="error" class="alert alert-error">{{ error }}</div>

  <div *ngIf="loading$ | async" class="loading">
    <p>Loading dealer data...</p>
  </div>

  <form *ngIf="!(loading$ | async)" (ngSubmit)="onSubmit()" class="dealer-form">
    <!-- Personal Information -->
    <div class="form-section">
      <h3>Personal Information</h3>

      <div class="form-row">
        <div class="form-group">
          <label for="full_name">Full Name <span class="required">*</span></label>
          <input
            id="full_name"
            type="text"
            [(ngModel)]="formData.full_name"
            name="full_name"
            placeholder="Enter full name"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="formData.email"
            name="email"
            placeholder="dealer@example.com"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="phone_e164">Phone (E.164) <span class="required">*</span></label>
        <input
          id="phone_e164"
          type="tel"
          [(ngModel)]="formData.phone_e164"
          name="phone_e164"
          placeholder="+919876543210"
          [readonly]="isEditMode"
          required
        />
        <small class="help-text">
          {{ isEditMode ? 'Phone number cannot be changed after creation' : 'International format with country code (e.g., +919876543210)' }}
        </small>
      </div>
    </div>

    <!-- Shop Information -->
    <div class="form-section">
      <h3>Shop Information</h3>

      <div class="form-group">
        <label for="shop_name">Shop Name <span class="required">*</span></label>
        <input
          id="shop_name"
          type="text"
          [(ngModel)]="formData.shop_name"
          name="shop_name"
          placeholder="Enter shop name"
          required
        />
      </div>

      <div class="form-group">
        <label for="address">Address <span class="required">*</span></label>
        <input
          id="address"
          type="text"
          [(ngModel)]="formData.address"
          name="address"
          placeholder="Enter full address"
          required
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="city">City <span class="required">*</span></label>
          <input
            id="city"
            type="text"
            [(ngModel)]="formData.city"
            name="city"
            placeholder="City"
            required
          />
        </div>

        <div class="form-group">
          <label for="state">State <span class="required">*</span></label>
          <input
            id="state"
            type="text"
            [(ngModel)]="formData.state"
            name="state"
            placeholder="State"
            required
          />
        </div>

        <div class="form-group">
          <label for="pincode">Pincode <span class="required">*</span></label>
          <input
            id="pincode"
            type="text"
            [(ngModel)]="formData.pincode"
            name="pincode"
            placeholder="6-digit pincode"
            maxlength="6"
            required
          />
        </div>
      </div>
    </div>

    <!-- Form Actions -->
    <div class="form-actions">
      <button type="button" (click)="cancel()" class="btn-secondary" [disabled]="saving">
        Cancel
      </button>
      <button type="submit" class="btn-primary" [disabled]="saving">
        <span *ngIf="!saving">{{ isEditMode ? 'Update Dealer' : 'Create Dealer' }}</span>
        <span *ngIf="saving">{{ isEditMode ? 'Updating...' : 'Creating...' }}</span>
      </button>
    </div>
  </form>
</div>
